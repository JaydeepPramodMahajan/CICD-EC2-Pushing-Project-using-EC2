name : "Deploy the Pipeline"
on:  workflow_dispatch
jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4 
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            - name: Verify the Version
              run : python --version
            - name: Install Dependancies
              run : pip install -r requirements.txt
            - name: Run The File
              run : python index.py 